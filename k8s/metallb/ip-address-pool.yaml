apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: medikong-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.10.10.240-10.10.10.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: medikong-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - medikong-pool
