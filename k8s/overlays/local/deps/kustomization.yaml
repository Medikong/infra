apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../namespaces
  - ../../../storage
  - ../auth-deps
  - ../patient-deps
  - ../appointment-deps
  - ../prescription-deps
  - ../notification-deps
  - ../messaging

images:
  - name: postgres
    newName: 10.10.10.10:5000/postgres
    newTag: "15"
  - name: apache/kafka
    newName: 10.10.10.10:5000/apache/kafka
    newTag: "3.8.1"
