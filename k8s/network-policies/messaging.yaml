apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-ingress
  namespace: medical-messaging
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: medical-messaging
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: medical-appointment
          podSelector:
            matchLabels:
              app: appointment-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: medical-prescription
          podSelector:
            matchLabels:
              app: prescription-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: medical-notification
          podSelector:
            matchLabels:
              app: notification-service
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
