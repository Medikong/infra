apiVersion: v1
kind: PersistentVolume
metadata:
  name: observability-grafana-pv
spec:
  capacity:
    storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: observability
    name: kube-prometheus-stack-grafana
  hostPath:
    path: /var/lib/cloudnative-observability/grafana
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - platform-1
---
