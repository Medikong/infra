deploymentMode: SingleBinary

chunksCache:
  enabled: false

resultsCache:
  enabled: false

loki:
  auth_enabled: false
  image:
    registry: 10.10.10.10:5000/docker.io
    repository: grafana/loki
    tag: 3.6.7
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 4Gi
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 768Mi
  nodeSelector:
    workload.medical-platform.io/tier: platform

sidecar:
  image:
    registry: 10.10.10.10:5000/docker.io
    repository: kiwigrid/k8s-sidecar
    tag: 2.5.0

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

gateway:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
