---
- name: Bootstrap Linux servers for kubeadm (CentOS/RHEL)
  hosts: k8s_cluster
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  handlers:
    - name: Restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted

  tasks:
    - name: Clean stale yum cache
      ansible.builtin.command: yum clean all
      changed_when: false

    - name: Update yum cache
      ansible.builtin.yum:
        name: '*'
        state: latest
      register: yum_update
      retries: 3
      delay: 15
      until: yum_update is succeeded

    - name: Install base packages
      ansible.builtin.yum:
        name:
          - bash-completion
          - ca-certificates
          - containerd
          - curl
          - git
          - gnupg
          - jq
          - rsync
          - tar
          - tmux
          - unzip
          - vim
          - wget
        state: present
      register: base_package_install
      retries: 3
      delay: 15
      until: base_package_install is succeeded

    - name: Install debug packages
      ansible.builtin.yum:
        name:
          - bind-utils
          - net-tools
          - netcat
          - tcpdump
          - traceroute
          - tree
        state: present
      register: debug_package_install
      retries: 3
      delay: 15
      until: debug_package_install is succeeded

    - name: Disable swap for kubelet
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap entries from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Load Kubernetes kernel modules now
      ansible.builtin.command: "modprobe {{ item }}"
      changed_when: false
      loop:
        - overlay
        - br_netfilter

    - name: Persist Kubernetes kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"
        content: |
          overlay
          br_netfilter

    - name: Configure Kubernetes sysctl settings
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Ensure containerd config directory exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config
      ansible.builtin.command: containerd config default
      register: containerd_default_config
      changed_when: false

    - name: Configure containerd to use systemd cgroup driver
      ansible.builtin.copy:
        dest: "{{ containerd_config_path }}"
        mode: "0644"
        content: "{{ containerd_default_config.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') }}"
      notify: Restart containerd

    - name: Ensure containerd is enabled
      ansible.builtin.service:
        name: containerd
        enabled: true
        state: started

    - name: Configure crictl to use containerd
      ansible.builtin.copy:
        dest: "{{ crictl_config_path }}"
        mode: "0644"
        content: |
          runtime-endpoint: {{ kubernetes_cri_socket }}
          image-endpoint: {{ kubernetes_cri_socket }}
          timeout: 10
          debug: false

    - name: Add Kubernetes yum repository
      ansible.builtin.yum_repository:
        name: kubernetes
        description: Kubernetes
        baseurl: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_apt_release }}/rpm/"
        enabled: true
        gpgcheck: true
        gpgkey: https://pkgs.k8s.io/core:/stable:/{{ kubernetes_apt_release }}/rpm/repodata/repomd.xml.key

    - name: Install kubelet, kubeadm, kubectl, and CRI tools
      ansible.builtin.yum:
        name:
          - cri-tools
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: Enable kubelet
      ansible.builtin.service:
        name: kubelet
        enabled: true

    - name: Install kubectl bash completion
      ansible.builtin.shell: |
        kubectl completion bash > /etc/bash_completion.d/kubectl
      args:
        creates: /etc/bash_completion.d/kubectl

    - name: Install kubeadm bash completion
      ansible.builtin.shell: |
        kubeadm completion bash > /etc/bash_completion.d/kubeadm
      args:
        creates: /etc/bash_completion.d/kubeadm

    - name: Enable kubectl alias completion for root
      ansible.builtin.copy:
        dest: /etc/profile.d/kubernetes-completion.sh
        mode: "0644"
        content: |
          if [ -f /usr/share/bash-completion/bash_completion ]; then
            . /usr/share/bash-completion/bash_completion
          fi
          alias k=kubectl
          complete -o default -F __start_kubectl k

    - name: Write bootstrap marker
      ansible.builtin.copy:
        dest: "{{ bootstrap_marker_path }}"
        mode: "0644"
        content: |
          cloudnative cluster server initialization completed
