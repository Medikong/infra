---
- name: Create ECR registry secrets in all namespaces
  hosts: control_plane
  become: false
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  vars:
    aws_region: ap-northeast-2
    ecr_registry: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com
    namespaces:
      - ticketing-auth
      - ticketing-concert
      - ticketing-reservation
      - ticketing-payment
      - ticketing-ticket
      - ticketing-notification
      - ticketing-dashboard
      - ticketing-messaging
      - synthetic
      - observability
      - monitoring
      - kong

  tasks:
    - name: Get ECR login token
      ansible.builtin.shell: |
        aws ecr get-login-password --region {{ aws_region }}
      register: ecr_token
      changed_when: false
      no_log: true

    - name: Create docker-registry secret in each namespace
      ansible.builtin.shell: |
        kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
        kubectl delete secret ecr-registry -n {{ item }} --ignore-not-found=true
        kubectl create secret docker-registry ecr-registry \
          --docker-server={{ ecr_registry }} \
          --docker-username=AWS \
          --docker-password='{{ ecr_token.stdout }}' \
          -n {{ item }}
      loop: "{{ namespaces }}"
      loop_control:
        label: "{{ item }}"
      no_log: true

    - name: Verify secrets created
      ansible.builtin.shell: |
        kubectl get secret ecr-registry -n {{ item }} -o jsonpath='{.metadata.name}'
      loop: "{{ namespaces }}"
      loop_control:
        label: "{{ item }}"
      register: secret_check
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Show secret verification results
      ansible.builtin.debug:
        msg: "Secret is present in namespace: {{ item.item }}"
      loop: "{{ secret_check.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stdout == 'ecr-registry'

    - name: Show missing secret verification results
      ansible.builtin.debug:
        msg: "Secret is missing in namespace: {{ item.item }}"
      loop: "{{ secret_check.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stdout != 'ecr-registry'
