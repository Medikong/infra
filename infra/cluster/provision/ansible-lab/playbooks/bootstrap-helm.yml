---
- name: Bootstrap Helm on the control plane
  hosts: control_plane
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Check existing Helm version
      ansible.builtin.command:
        argv:
          - helm
          - version
          - --short
      register: helm_version_check
      changed_when: false
      failed_when: false

    - name: Download Helm install script
      ansible.builtin.get_url:
        url: "{{ helm_install_script_url }}"
        dest: "{{ helm_install_script_path }}"
        mode: "0755"
      when: helm_version_check.rc != 0 or helm_version not in helm_version_check.stdout

    - name: Install Helm
      ansible.builtin.command:
        argv:
          - bash
          - "{{ helm_install_script_path }}"
      environment:
        DESIRED_VERSION: "{{ helm_version }}"
      register: helm_install
      changed_when: "'helm installed' in helm_install.stdout or 'Downloading' in helm_install.stdout"
      when: helm_version_check.rc != 0 or helm_version not in helm_version_check.stdout

    - name: Verify Helm installation
      ansible.builtin.command:
        argv:
          - helm
          - version
          - --short
      register: helm_installed_version
      changed_when: false

    - name: Print Helm version
      ansible.builtin.debug:
        var: helm_installed_version.stdout
