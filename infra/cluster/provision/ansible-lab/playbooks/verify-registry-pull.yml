---
- name: Verify each node can pull an image from the local registry
  hosts: k8s_cluster
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Fail when pull test image is not provided
      ansible.builtin.fail:
        msg: "REGISTRY_PULL_TEST_IMAGE is required, for example 10.10.10.10:5000/patient-service:latest."
      when: registry_pull_test_image | length == 0

    - name: Pull test image through containerd CRI
      ansible.builtin.command:
        argv:
          - crictl
          - --runtime-endpoint
          - "{{ kubernetes_cri_socket }}"
          - pull
          - "{{ registry_pull_test_image }}"
      changed_when: false
