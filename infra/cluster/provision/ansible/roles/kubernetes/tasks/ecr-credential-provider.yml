---
- name: Validate ECR credential provider release inputs
  ansible.builtin.assert:
    that:
      - ansible_facts["architecture"] in ["aarch64", "arm64"]
      - ecr_credential_provider_architecture == "arm64"
      - ecr_credential_provider_download_url is match('^https://artifacts\.k8s\.io/binaries/cloud-provider-aws/')
      - ecr_credential_provider_checksum is match('^[a-f0-9]{64}$')
    fail_msg: ECR credential provider requires a pinned official ARM64 artifact and SHA256 checksum.

- name: Ensure ECR credential provider directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ ecr_credential_provider_bin_dir }}"
    - "{{ ecr_credential_provider_config_path | dirname }}"

- name: Install pinned ECR credential provider binary
  ansible.builtin.get_url:
    url: "{{ ecr_credential_provider_download_url }}"
    dest: "{{ ecr_credential_provider_binary_path }}"
    checksum: "sha256:{{ ecr_credential_provider_checksum }}"
    owner: root
    group: root
    mode: "0755"
  notify: Restart kubelet

- name: Configure kubelet ECR credential provider matching
  ansible.builtin.copy:
    dest: "{{ ecr_credential_provider_config_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      apiVersion: kubelet.config.k8s.io/v1
      kind: CredentialProviderConfig
      providers:
        - name: ecr-credential-provider
          matchImages:
            - "*.dkr.ecr.*.amazonaws.com"
            - "*.dkr.ecr.*.amazonaws.com.cn"
            - "*.dkr.ecr-fips.*.amazonaws.com"
          defaultCacheDuration: "0"
          apiVersion: credentialprovider.kubelet.k8s.io/v1
  notify: Restart kubelet
