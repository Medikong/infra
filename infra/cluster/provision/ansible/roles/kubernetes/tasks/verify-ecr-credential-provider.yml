---
- name: Check ECR credential provider binary
  ansible.builtin.stat:
    path: "{{ ecr_credential_provider_binary_path }}"
  register: ecr_credential_provider_binary

- name: Read kubelet environment configuration
  ansible.builtin.slurp:
    src: /etc/default/kubelet
  register: ecr_credential_provider_kubelet_environment

- name: Require installed provider and kubelet flags
  ansible.builtin.assert:
    that:
      - ecr_credential_provider_binary.stat.exists
      - ecr_credential_provider_binary.stat.executable
      - ('--image-credential-provider-bin-dir=' ~ ecr_credential_provider_bin_dir) in (ecr_credential_provider_kubelet_environment.content | b64decode)
      - ('--image-credential-provider-config=' ~ ecr_credential_provider_config_path) in (ecr_credential_provider_kubelet_environment.content | b64decode)
    fail_msg: ECR credential provider binary or kubelet flags are missing.

- name: Verify provider can obtain ECR credentials from the node role
  ansible.builtin.command:
    argv:
      - "{{ ecr_credential_provider_binary_path }}"
    stdin: >-
      {"apiVersion":"credentialprovider.kubelet.k8s.io/v1","kind":"CredentialProviderRequest","image":"{{ ecr_credential_provider_test_image }}"}
  changed_when: false
  no_log: true

- name: Verify kubelet service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - kubelet
  register: ecr_credential_provider_kubelet_status
  changed_when: false
  failed_when: ecr_credential_provider_kubelet_status.stdout != "active"
