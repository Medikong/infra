---
- name: Check Kubernetes admin kubeconfig for Metrics Server
  ansible.builtin.stat:
    path: "{{ kubernetes_admin_conf_path }}"
  register: metrics_admin_conf

- name: Require initialized cluster for Metrics Server
  ansible.builtin.assert:
    that: metrics_admin_conf.stat.exists
    fail_msg: Kubernetes admin kubeconfig is missing.

- name: Install Metrics Server
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - --server-side=true
      - --force-conflicts
      - -f
      - "{{ metrics_server_manifest_url }}"
  environment:
    KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
  register: metrics_server_apply
  changed_when: "'configured' in metrics_server_apply.stdout or 'created' in metrics_server_apply.stdout or 'serverside-applied' in metrics_server_apply.stdout"

- name: Configure Metrics Server for kubeadm certificates
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - kube-system
      - patch
      - deployment
      - metrics-server
      - --type=json
      - -p
      - '[{"op":"add","path":"/spec/template/spec/hostNetwork","value":false},{"op":"add","path":"/spec/template/spec/dnsPolicy","value":"ClusterFirst"},{"op":"add","path":"/spec/template/spec/containers/0/args","value":["--cert-dir=/tmp","--secure-port=10250","--kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP","--kubelet-use-node-status-port","--metric-resolution=15s","--kubelet-insecure-tls"]}]'
  environment:
    KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
  register: metrics_server_patch
  changed_when: "'patched' in metrics_server_patch.stdout"

- name: Wait for Metrics Server
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - kube-system
      - get
      - deployment
      - metrics-server
      - -o
      - 'jsonpath={.status.availableReplicas}'
  environment:
    KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
  register: metrics_server_available
  changed_when: false
  retries: "{{ ((metrics_server_wait_timeout | regex_replace('s$', '') | int) / 5) | int }}"
  delay: 5
  until: metrics_server_available.stdout | int >= 1
