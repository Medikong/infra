---
- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Kubernetes apt key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_release }}/deb/Release.key"
    dest: /tmp/kubernetes-release.key
    mode: "0644"

- name: Install Kubernetes apt keyring
  ansible.builtin.shell: gpg --dearmor < /tmp/kubernetes-release.key > /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_release }}/deb/ /

- name: Install Kubernetes apt packages
  ansible.builtin.apt:
    name:
      - cri-tools
      - kubeadm
      - kubectl
      - kubelet
    state: present
    update_cache: true

- name: Hold Kubernetes apt packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - cri-tools
    - kubeadm
    - kubectl
    - kubelet
