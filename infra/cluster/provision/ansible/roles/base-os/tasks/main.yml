---
- name: Install Debian-family base packages
  ansible.builtin.apt:
    name: "{{ base_os_packages_debian + base_os_debug_packages_debian }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  register: base_os_apt_install
  retries: 3
  delay: 10
  until: base_os_apt_install is succeeded
  when: ansible_os_family == "Debian"

- name: Install Red Hat-family base packages
  ansible.builtin.dnf:
    name: "{{ base_os_packages_redhat + base_os_debug_packages_redhat }}"
    state: present
    update_cache: true
  register: base_os_dnf_install
  retries: 3
  delay: 10
  until: base_os_dnf_install is succeeded
  when: ansible_os_family == "RedHat"

- name: Reject unsupported operating systems
  ansible.builtin.assert:
    that: ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "Supported OS families are Debian and RedHat."

- name: Disable swap for kubelet
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove active swap entries from fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: Load Kubernetes kernel modules
  ansible.builtin.command: "modprobe {{ item }}"
  loop:
    - overlay
    - br_netfilter
  changed_when: false

- name: Persist Kubernetes kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter

- name: Configure Kubernetes sysctl settings
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
  register: kubernetes_sysctl

- name: Apply Kubernetes sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: false
  when: kubernetes_sysctl.changed
