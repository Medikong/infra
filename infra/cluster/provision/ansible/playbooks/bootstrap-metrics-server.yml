---
- name: Bootstrap Kubernetes Metrics Server
  hosts: control_plane
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Check admin kubeconfig
      ansible.builtin.stat:
        path: "{{ kubernetes_admin_conf_path }}"
      register: admin_conf

    - name: Fail when cluster is not initialized
      ansible.builtin.fail:
        msg: "Kubernetes admin kubeconfig is missing. Run cluster-bootstrap first."
      when: not admin_conf.stat.exists

    - name: Remove existing Metrics Server deployment before applying upstream manifest
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - kube-system
          - delete
          - deployment
          - metrics-server
          - --ignore-not-found=true
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
      register: metrics_server_deployment_delete
      changed_when: "'deleted' in metrics_server_deployment_delete.stdout"

    - name: Install Metrics Server
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - --server-side=true
          - --force-conflicts
          - -f
          - "{{ metrics_server_manifest_url }}"
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
      register: metrics_server_apply
      changed_when: "'configured' in metrics_server_apply.stdout or 'created' in metrics_server_apply.stdout or 'serverside-applied' in metrics_server_apply.stdout"

    - name: Configure Metrics Server for local kubeadm kubelet certificates
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - kube-system
          - patch
          - deployment
          - metrics-server
          - --type=json
          - -p
          - '[{"op":"add","path":"/spec/strategy/rollingUpdate/maxUnavailable","value":1},{"op":"add","path":"/spec/strategy/rollingUpdate/maxSurge","value":1},{"op":"add","path":"/spec/template/spec/hostNetwork","value":true},{"op":"add","path":"/spec/template/spec/dnsPolicy","value":"ClusterFirstWithHostNet"},{"op":"add","path":"/spec/template/spec/nodeSelector","value":{"kubernetes.io/os":"linux","kubernetes.io/hostname":"{{ metrics_server_node_selector_hostname }}"}},{"op":"add","path":"/spec/template/spec/tolerations","value":[{"key":"node-role.kubernetes.io/control-plane","operator":"Exists","effect":"NoSchedule"},{"key":"node.kubernetes.io/not-ready","operator":"Exists","effect":"NoExecute","tolerationSeconds":300},{"key":"node.kubernetes.io/unreachable","operator":"Exists","effect":"NoExecute","tolerationSeconds":300}]},{"op":"add","path":"/spec/template/spec/containers/0/args","value":["--cert-dir=/tmp","--secure-port=4443","--kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP","--kubelet-use-node-status-port","--metric-resolution=15s","--kubelet-insecure-tls"]},{"op":"add","path":"/spec/template/spec/containers/0/ports/0/containerPort","value":4443},{"op":"add","path":"/spec/template/spec/containers/0/livenessProbe/initialDelaySeconds","value":20},{"op":"add","path":"/spec/template/spec/containers/0/livenessProbe/timeoutSeconds","value":5},{"op":"add","path":"/spec/template/spec/containers/0/readinessProbe/initialDelaySeconds","value":30},{"op":"add","path":"/spec/template/spec/containers/0/readinessProbe/timeoutSeconds","value":5}]'
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
      register: metrics_server_patch
      changed_when: "'patched' in metrics_server_patch.stdout"

    - name: Tune Metrics Server resources for local memory budget
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - kube-system
          - patch
          - deployment
          - metrics-server
          - --type=json
          - -p
          - '[{"op":"add","path":"/spec/template/spec/containers/0/resources","value":{"requests":{"cpu":"50m","memory":"64Mi"},"limits":{"cpu":"150m","memory":"128Mi"}}}]'
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
      register: metrics_server_resources
      changed_when: "'patched' in metrics_server_resources.stdout"

    - name: Restart Metrics Server pods after local runtime configuration
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - kube-system
          - delete
          - pod
          - -l
          - k8s-app=metrics-server
          - --ignore-not-found=true
          - --force
          - --grace-period=0
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
      register: metrics_server_pod_delete
      changed_when: "'deleted' in metrics_server_pod_delete.stdout"

    - name: Wait until Metrics Server deployment is Available
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - kube-system
          - rollout
          - status
          - deployment/metrics-server
          - "--timeout={{ metrics_server_wait_timeout }}"
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
      changed_when: false

    - name: Wait until Metrics APIService is Available
      ansible.builtin.command:
        argv:
          - kubectl
          - wait
          - --for=condition=Available
          - apiservice/v1beta1.metrics.k8s.io
          - "--timeout={{ metrics_server_wait_timeout }}"
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
      changed_when: false
