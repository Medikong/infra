version: "3"

env:
  ANSIBLE_CONFIG: ../../ansible.cfg
  OBJC_DISABLE_INITIALIZE_FORK_SAFETY: "YES"

vars:
  ROOT_DIR: '{{.TASKFILE_DIR}}/../../../../../..'
  LOCAL_BIN_PREPEND: '{{.ROOT_DIR}}/.local/ansible-venv/bin:{{.ROOT_DIR}}/.local/bin'
  WORKSPACE: '{{default "dev" .WORKSPACE}}'
  ANSIBLE_INVENTORY: '{{default (printf "%s/.local/terraform/%s/inventory.ini" .ROOT_DIR .WORKSPACE) .ANSIBLE_INVENTORY}}'
  ANSIBLE_FLAGS: '{{default "" .ANSIBLE_FLAGS}}'
  CONNECT_RETRIES: '{{default "30" .CONNECT_RETRIES}}'
  CONNECT_DELAY: '{{default "10" .CONNECT_DELAY}}'
  SHARED_BACKEND_CONFIG: '{{default "" .SHARED_BACKEND_CONFIG}}'
  ENVIRONMENT_BACKEND_CONFIG: '{{default "" .ENVIRONMENT_BACKEND_CONFIG}}'
  VAR_FILE: '{{default "" .VAR_FILE}}'

tasks:
  default:
    desc: Show aws-dev Ansible tasks.
    cmds:
      - task --list

  requirements:install:
    desc: Bootstrap the local ansible-venv (ansible-core, boto3) and install the pinned Ansible collections.
    cmds:
      - |
        set -eu
        venv_dir='{{.ROOT_DIR}}/.local/ansible-venv'
        if [ ! -x "${venv_dir}/bin/ansible-playbook" ]; then
          python3 -m venv --without-pip "${venv_dir}" 2>/dev/null || python3 -m venv "${venv_dir}"
          if [ ! -x "${venv_dir}/bin/pip" ]; then
            curl -sSL https://bootstrap.pypa.io/get-pip.py | "${venv_dir}/bin/python3"
          fi
          "${venv_dir}/bin/pip" install --disable-pip-version-check --quiet "ansible-core==2.20.5" "boto3>=1.35.0,<2.0.0"
        fi
      - export PATH="{{.LOCAL_BIN_PREPEND}}:$PATH"; ansible-galaxy collection install -r ../../requirements.yml
      - |
        set -eu
        local_bin='{{.ROOT_DIR}}/.local/bin'
        mkdir -p "${local_bin}"
        if ! command -v rg >/dev/null 2>&1 && [ ! -x "${local_bin}/rg" ]; then
          tmp="$(mktemp -d)"
          curl -sSL "https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep-14.1.1-x86_64-unknown-linux-musl.tar.gz" -o "${tmp}/rg.tar.gz"
          tar xzf "${tmp}/rg.tar.gz" -C "${tmp}"
          cp "${tmp}"/ripgrep-*/rg "${local_bin}/rg"
          chmod +x "${local_bin}/rg"
          rm -rf "${tmp}"
        fi
        if ! command -v session-manager-plugin >/dev/null 2>&1 && [ ! -x "${local_bin}/session-manager-plugin" ]; then
          tmp="$(mktemp -d)"
          curl -sSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "${tmp}/smp.deb"
          dpkg-deb -x "${tmp}/smp.deb" "${tmp}/extracted"
          cp "${tmp}/extracted/usr/local/sessionmanagerplugin/bin/session-manager-plugin" "${local_bin}/session-manager-plugin"
          chmod +x "${local_bin}/session-manager-plugin"
          rm -rf "${tmp}"
        fi

  inventory:generate:
    desc: Generate the aws-dev inventory from the selected Terraform workspace.
    cmds:
      - task -d '{{.ROOT_DIR}}/terraform' inventory ENV=dev WORKSPACE='{{.WORKSPACE}}'

  inventory:check:
    desc: Validate the Terraform-generated aws-dev inventory contract.
    cmds:
      - |
        set -eu
        export PATH="{{.LOCAL_BIN_PREPEND}}:$PATH"
        inventory='{{.ANSIBLE_INVENTORY}}'
        test -f "${inventory}" || {
          printf 'Missing Terraform inventory: %s\nRun: task terraform:inventory ENV=dev WORKSPACE=%s\n' "${inventory}" '{{.WORKSPACE}}' >&2
          exit 2
        }
        rg -q '^\[control_plane\]' "${inventory}"
        rg -q '^\[workers\]' "${inventory}"
        rg -q 'ansible_connection=amazon\.aws\.aws_ssm' "${inventory}"
        rg -q 'ansible_aws_ssm_instance_id=i-' "${inventory}"
        rg -q 'ansible_aws_ssm_bucket_name=' "${inventory}"
        rg -q 'ansible_become_user=root' "${inventory}"
        if rg -q 'AWS-StartSSHSession|ansible_ssh_private_key_file|ansible_user=' "${inventory}"; then
          printf 'Terraform inventory still contains an SSH transport setting: %s\n' "${inventory}" >&2
          exit 2
        fi

  ansible:ping:
    desc: Verify aws-dev SSM-backed Ansible connectivity.
    deps:
      - inventory:check
    cmds:
      - |
        set -eu
        export PATH="{{.LOCAL_BIN_PREPEND}}:$PATH"
        if [ -z "${AWS_PROFILE:-}" ] && [ "${GITHUB_ACTIONS:-false}" != 'true' ]; then
          export AWS_PROFILE=dropmong-infra-admin
        fi
        attempt=1
        while ! ansible {{.ANSIBLE_FLAGS}} -i '{{.ANSIBLE_INVENTORY}}' all -m ping; do
          if [ "${attempt}" -ge '{{.CONNECT_RETRIES}}' ]; then
            printf 'AWS dev nodes did not become reachable after %s attempts.\n' "${attempt}" >&2
            exit 2
          fi
          attempt=$((attempt + 1))
          sleep '{{.CONNECT_DELAY}}'
        done

  syntax:
    desc: Syntax-check every aws-dev playbook.
    deps:
      - inventory:check
    cmds:
      - export PATH="{{.LOCAL_BIN_PREPEND}}:$PATH"; ansible-playbook {{.ANSIBLE_FLAGS}} -i '{{.ANSIBLE_INVENTORY}}' --syntax-check playbooks/site.yml playbooks/kubernetes.yml playbooks/node-labels.yml playbooks/helm.yml playbooks/argocd.yml playbooks/ecr-registry-refresh.yml playbooks/secrets.yml playbooks/verify.yml {{.CLI_ARGS}}

  aws-dev:kubernetes:
    desc: Install the aws-dev kubeadm cluster.
    cmds:
      - task: playbook
        vars:
          PLAYBOOK: kubernetes.yml
          CLI_ARGS: '{{.CLI_ARGS}}'

  aws-dev:node-labels:
    desc: Apply Terraform-provided aws-dev node labels and taints.
    cmds:
      - task: playbook
        vars:
          PLAYBOOK: node-labels.yml
          CLI_ARGS: '{{.CLI_ARGS}}'

  aws-dev:helm:
    desc: Install Helm on aws-dev.
    cmds:
      - task: playbook
        vars:
          PLAYBOOK: helm.yml
          CLI_ARGS: '{{.CLI_ARGS}}'

  aws-dev:ecr-refresh:
    desc: Refresh the ecr-registry image pull secret using the operator's AWS SSO session (token expires ~12h).
    cmds:
      - task: playbook
        vars:
          PLAYBOOK: ecr-registry-refresh.yml

  aws-dev:argocd:
    desc: Install Argo CD and the aws-dev root Application.
    cmds:
      - task: playbook
        vars:
          PLAYBOOK: argocd.yml
          CLI_ARGS: '{{.CLI_ARGS}}'

  aws-dev:secrets:
    desc: Generate (idempotent) aws-dev application secrets, e.g. auth-runtime-credentials.
    cmds:
      - task: playbook
        vars:
          PLAYBOOK: secrets.yml
          CLI_ARGS: '{{.CLI_ARGS}}'

  aws-dev:verify:
    desc: Verify aws-dev Kubernetes readiness.
    cmds:
      - task: playbook
        vars:
          PLAYBOOK: verify.yml
          CLI_ARGS: '{{.CLI_ARGS}}'

  aws-dev:bootstrap:
    internal: true
    desc: Create the AWS dev infrastructure and bootstrap Kubernetes.
    cmds:
      - task -d '{{.ROOT_DIR}}/terraform' init STACK=shared BACKEND_CONFIG='{{.SHARED_BACKEND_CONFIG}}'
      - task -d '{{.ROOT_DIR}}/terraform' plan STACK=shared
      - task -d '{{.ROOT_DIR}}/terraform' apply STACK=shared
      - task: aws-dev:apply
        vars:
          WORKSPACE: '{{.WORKSPACE}}'
          ENVIRONMENT_BACKEND_CONFIG: '{{.ENVIRONMENT_BACKEND_CONFIG}}'
          VAR_FILE: '{{.VAR_FILE}}'

  aws-dev:apply:
    internal: true
    desc: Apply AWS dev infrastructure and Kubernetes configuration changes.
    cmds:
      - task -d '{{.ROOT_DIR}}/terraform' init STACK=environment ENV=dev BACKEND_CONFIG='{{.ENVIRONMENT_BACKEND_CONFIG}}'
      - task -d '{{.ROOT_DIR}}/terraform' workspace ENV=dev WORKSPACE='{{.WORKSPACE}}'
      - task -d '{{.ROOT_DIR}}/terraform' plan STACK=environment ENV=dev WORKSPACE='{{.WORKSPACE}}' VAR_FILE='{{.VAR_FILE}}'
      - task -d '{{.ROOT_DIR}}/terraform' apply STACK=environment ENV=dev WORKSPACE='{{.WORKSPACE}}'
      - task: ansible:bootstrap

  aws-dev:configure:
    desc: Configure Kubernetes after applying a saved Terraform plan.
    cmds:
      - task: ansible:bootstrap

  ansible:bootstrap:
    internal: true
    cmds:
      - task: inventory:check
      - task: syntax
      - task: ansible:ping
      - task: playbook
        vars:
          PLAYBOOK: site.yml
          CLI_ARGS: '{{.CLI_ARGS}}'

  playbook:
    internal: true
    requires:
      vars:
        - PLAYBOOK
    cmds:
      - |
        set -eu
        export PATH="{{.LOCAL_BIN_PREPEND}}:$PATH"
        if [ -z "${AWS_PROFILE:-}" ] && [ "${GITHUB_ACTIONS:-false}" != 'true' ]; then
          export AWS_PROFILE=dropmong-infra-admin
        fi
        ansible-playbook {{.ANSIBLE_FLAGS}} -i '{{.ANSIBLE_INVENTORY}}' 'playbooks/{{.PLAYBOOK}}' {{.CLI_ARGS}}

  aws-dev:ssh:
    desc: Open an SSM session to the aws-dev control-plane node.
    cmds:
      - |
        set -eu
        export PATH="{{.LOCAL_BIN_PREPEND}}:$PATH"
        if [ -z "${AWS_PROFILE:-}" ] && [ "${GITHUB_ACTIONS:-false}" != 'true' ]; then
          export AWS_PROFILE=dropmong-infra-admin
        fi
        instance_id="$(rg -o 'ansible_aws_ssm_instance_id=(i-[a-z0-9]+)' -r '$1' '{{.ANSIBLE_INVENTORY}}' | head -1)"
        [ -n "${instance_id}" ] || { printf 'Could not find control-plane instance id in %s\n' '{{.ANSIBLE_INVENTORY}}' >&2; exit 2; }
        region="$(rg -o 'ansible_aws_ssm_region=(\S+)' -r '$1' '{{.ANSIBLE_INVENTORY}}' | head -1)"
        aws ssm start-session --target "${instance_id}" --region "${region:-ap-northeast-2}"
