---
- name: Prepare aws-dev Ubuntu ARM64 Kubernetes hosts
  hosts: k8s_cluster
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Require Ubuntu ARM64 nodes
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_architecture in ["aarch64", "arm64"]
        fail_msg: aws-dev requires Ubuntu ARM64 nodes from Terraform.
  roles:
    - base-os
    - containerd
    - kubernetes
  tasks:
    - name: Prepare CNI images on every Kubernetes host
      ansible.builtin.include_role:
        name: cni
        tasks_from: prepare

- name: Initialize aws-dev primary control plane
  hosts: "control_plane[0]"
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
  roles:
    - control-plane
    - cni

- name: Join aws-dev additional control planes
  hosts: "control_plane[1:]"
  serial: 1
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Join additional control plane
      ansible.builtin.include_role:
        name: control-plane
        tasks_from: join

- name: Join aws-dev workers
  hosts: workers
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  roles:
    - worker

- name: Finish aws-dev Kubernetes services
  hosts: "control_plane[0]"
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Wait for CNI readiness
      ansible.builtin.include_role:
        name: cni
        tasks_from: ready
    - name: Install Kubernetes metrics services
      ansible.builtin.include_role:
        name: kubernetes
        tasks_from: metrics
