---
- name: Install and verify aws-dev ECR credential provider
  hosts: k8s_cluster
  serial: 1
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Require Ubuntu ARM64 nodes
      ansible.builtin.assert:
        that:
          - ansible_facts["distribution"] == "Ubuntu"
          - ansible_facts["architecture"] in ["aarch64", "arm64"]
        fail_msg: aws-dev ECR credential provider requires Ubuntu ARM64 nodes.
  tasks:
    - name: Install ECR credential provider
      ansible.builtin.include_role:
        name: kubernetes
        tasks_from: ecr-credential-provider

    - name: Configure kubelet credential provider flags
      ansible.builtin.include_role:
        name: kubernetes
        tasks_from: kubelet

    - name: Apply kubelet restart before verification
      ansible.builtin.meta: flush_handlers

    - name: Verify ECR credential provider integration
      ansible.builtin.include_role:
        name: kubernetes
        tasks_from: verify-ecr-credential-provider

    - name: Wait for the updated Kubernetes node to be Ready
      ansible.builtin.command:
        argv:
          - kubectl
          - wait
          - --for=condition=Ready
          - "node/{{ inventory_hostname }}"
          - "--timeout={{ kubernetes_node_ready_timeout }}"
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
      delegate_to: "{{ groups['control_plane'][0] }}"
      changed_when: false
