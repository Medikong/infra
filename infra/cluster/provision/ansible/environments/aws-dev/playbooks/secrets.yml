---
- name: Create aws-dev application secrets
  hosts: control_plane
  become: false
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  vars:
    aws_dev_auth_allowed_origins: "{{ lookup('env', 'AWS_DEV_AUTH_ALLOWED_ORIGINS') | default('https://aws-dev.dropmong.internal', true) }}"

  tasks:
    - name: Ensure dropmong-auth and dropmong-user namespaces exist
      ansible.builtin.shell: |
        kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
      loop:
        - dropmong-auth
        - dropmong-user
      changed_when: false
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"

    - name: Check if auth-runtime-credentials secret already exists
      ansible.builtin.shell: |
        kubectl -n dropmong-auth get secret auth-runtime-credentials -o jsonpath='{.metadata.name}'
      register: auth_runtime_credentials_check
      changed_when: false
      failed_when: false
      check_mode: false
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"

    - name: Check if user-runtime-credentials secret already exists
      ansible.builtin.shell: |
        kubectl -n dropmong-user get secret user-runtime-credentials -o jsonpath='{.metadata.name}'
      register: user_runtime_credentials_check
      changed_when: false
      failed_when: false
      check_mode: false
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"

    # Generated once and left alone on re-runs: regenerating on every playbook
    # run would rotate every key and invalidate every existing session,
    # token, and Auth<->User proof pairing.
    #
    # These are placeholder dev keys, not real secrets - real key material
    # and rotation is auth-service/user-service's own call, not CI/CD's.
    #
    # Both secrets are generated together in one task so the cross-service
    # proof keys are an actually-matching pair (auth's auth-proof key <->
    # user's copy of auth's public key, and user's user-signing key <->
    # auth's copy of user's public key) rather than two independently
    # generated, non-matching placeholders. media-proof-public-key has no
    # real media-service to pair with yet, so it's a standalone placeholder.
    #
    # Ed25519 keys must be raw base64 (RawStdEncoding, no PEM) matching Go's
    # ed25519.PrivateKey (64 bytes: 32-byte seed + 32-byte public key) and
    # ed25519.PublicKey (32 bytes) - see
    # auth-service/internal/infrastructure/cryptography/user_proof.go and
    # user-service/internal/platform/config/config.go (developmentKeyPair).
    # PKCS8 PEM (`openssl genpkey` output directly) is the WRONG format here;
    # extract the raw seed/pubkey from the DER encoding instead (fixed-size
    # ASN.1 prefix for Ed25519, so the last 32 bytes are always the raw key).
    # The RSA JWT key is unrelated and stays plain PEM (auth-service parses
    # it with pem.Decode + x509.ParsePKCS8PrivateKey).
    - name: Generate and create auth-runtime-credentials and user-runtime-credentials secrets
      ansible.builtin.shell: |
        set -euo pipefail
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT

        raw_ed25519_pair() {
          # $1 = output prefix, e.g. "$tmpdir/authproof" -> writes
          # "$1.private_b64" (64-byte Go private key) and "$1.public_b64" (32-byte public key)
          local prefix="$1"
          openssl genpkey -algorithm ed25519 -out "${prefix}.pem" 2>/dev/null
          openssl pkey -in "${prefix}.pem" -outform DER -out "${prefix}.priv.der" 2>/dev/null
          openssl pkey -in "${prefix}.pem" -pubout -outform DER -out "${prefix}.pub.der" 2>/dev/null
          tail -c 32 "${prefix}.priv.der" > "${prefix}.seed.bin"
          tail -c 32 "${prefix}.pub.der" > "${prefix}.pub.bin"
          cat "${prefix}.seed.bin" "${prefix}.pub.bin" > "${prefix}.private.bin"
          base64 -w0 "${prefix}.private.bin" | tr -d '=' > "${prefix}.private_b64"
          base64 -w0 "${prefix}.pub.bin" | tr -d '=' > "${prefix}.public_b64"
        }

        raw_ed25519_pair "$tmpdir/authproof"
        raw_ed25519_pair "$tmpdir/usersigning"
        raw_ed25519_pair "$tmpdir/mediaproof"

        openssl genrsa -out "$tmpdir/jwt-private-key-pem" 2048 2>/dev/null

        printf '%s' "auth-service" > "$tmpdir/jwt-issuer"
        printf '%s' "$(openssl rand -hex 8)" > "$tmpdir/jwt-key-id"
        printf '%s' "$(openssl rand -hex 8)" > "$tmpdir/auth-proof-key-id"
        printf '%s' "$(openssl rand -hex 8)" > "$tmpdir/user-proof-key-id"
        printf '%s' "$(openssl rand -hex 8)" > "$tmpdir/media-proof-key-id"
        printf '%s' "$(openssl rand -hex 32)" > "$tmpdir/credential-hmac-key"
        printf '%s' "$(openssl rand -hex 16)" > "$tmpdir/replay-encryption-key"
        printf '%s' "${AUTH_ALLOWED_ORIGINS}" > "$tmpdir/allowed-origins"
        openssl rand 32 | base64 -w0 | tr -d '=' > "$tmpdir/private-name-encryption-key"

        if [ "${CREATE_AUTH_SECRET}" = "true" ]; then
          kubectl -n dropmong-auth create secret generic auth-runtime-credentials \
            --from-file=jwt-private-key-pem="$tmpdir/jwt-private-key-pem" \
            --from-file=jwt-key-id="$tmpdir/jwt-key-id" \
            --from-file=jwt-issuer="$tmpdir/jwt-issuer" \
            --from-file=credential-hmac-key="$tmpdir/credential-hmac-key" \
            --from-file=replay-encryption-key="$tmpdir/replay-encryption-key" \
            --from-file=auth-proof-private-key="$tmpdir/authproof.private_b64" \
            --from-file=auth-proof-key-id="$tmpdir/auth-proof-key-id" \
            --from-file=user-proof-public-key="$tmpdir/usersigning.public_b64" \
            --from-file=user-proof-key-id="$tmpdir/user-proof-key-id" \
            --from-file=allowed-origins="$tmpdir/allowed-origins" \
            --dry-run=client -o yaml | kubectl apply -f -
        fi

        if [ "${CREATE_USER_SECRET}" = "true" ]; then
          kubectl -n dropmong-user create secret generic user-runtime-credentials \
            --from-file=user-signing-private-key="$tmpdir/usersigning.private_b64" \
            --from-file=user-signing-key-id="$tmpdir/user-proof-key-id" \
            --from-file=auth-proof-public-key="$tmpdir/authproof.public_b64" \
            --from-file=auth-proof-key-id="$tmpdir/auth-proof-key-id" \
            --from-file=media-proof-public-key="$tmpdir/mediaproof.public_b64" \
            --from-file=media-proof-key-id="$tmpdir/media-proof-key-id" \
            --from-file=private-name-encryption-key="$tmpdir/private-name-encryption-key" \
            --dry-run=client -o yaml | kubectl apply -f -
        fi
      args:
        executable: /bin/bash
      when: auth_runtime_credentials_check.stdout != 'auth-runtime-credentials' or user_runtime_credentials_check.stdout != 'user-runtime-credentials'
      environment:
        AUTH_ALLOWED_ORIGINS: "{{ aws_dev_auth_allowed_origins }}"
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
        CREATE_AUTH_SECRET: "{{ 'true' if auth_runtime_credentials_check.stdout != 'auth-runtime-credentials' else 'false' }}"
        CREATE_USER_SECRET: "{{ 'true' if user_runtime_credentials_check.stdout != 'user-runtime-credentials' else 'false' }}"
      no_log: true

    - name: Verify aws-dev secrets exist
      ansible.builtin.shell: |
        kubectl -n {{ item.namespace }} get secret {{ item.name }} -o jsonpath='{.metadata.name}'
      loop:
        - namespace: dropmong-auth
          name: auth-runtime-credentials
        - namespace: dropmong-user
          name: user-runtime-credentials
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"
      register: aws_dev_secret_check
      changed_when: false
      failed_when: false
      check_mode: false
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"

    - name: Show aws-dev secret verification results
      ansible.builtin.debug:
        msg: "Secret is present: {{ item.item.namespace }}/{{ item.item.name }}"
      loop: "{{ aws_dev_secret_check.results }}"
      loop_control:
        label: "{{ item.item.namespace }}/{{ item.item.name }}"
      when: item.stdout == item.item.name

    - name: Show missing aws-dev secret verification results
      ansible.builtin.debug:
        msg: "Secret is missing: {{ item.item.namespace }}/{{ item.item.name }}"
      loop: "{{ aws_dev_secret_check.results }}"
      loop_control:
        label: "{{ item.item.namespace }}/{{ item.item.name }}"
      when: item.stdout != item.item.name
