---
- name: Create aws-dev application secrets
  hosts: control_plane
  become: false
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  vars:
    aws_dev_auth_allowed_origins: "{{ lookup('env', 'AWS_DEV_AUTH_ALLOWED_ORIGINS') | default('https://aws-dev.dropmong.internal', true) }}"

  tasks:
    - name: Ensure dropmong-auth namespace exists
      ansible.builtin.shell: |
        kubectl create namespace dropmong-auth --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"

    - name: Check if auth-runtime-credentials secret already exists
      ansible.builtin.shell: |
        kubectl -n dropmong-auth get secret auth-runtime-credentials -o jsonpath='{.metadata.name}'
      register: auth_runtime_credentials_check
      changed_when: false
      failed_when: false
      check_mode: false
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"

    # Generated once and left alone on re-runs: regenerating these on every
    # playbook run would rotate the JWT/HMAC/replay keys and invalidate every
    # existing session and token. user-proof-public-key is a placeholder
    # keypair generated locally, not a real key from user-service (user-service
    # has no equivalent key-generation step yet) -- User-to-Auth proof
    # verification will not be cryptographically meaningful until user-service
    # generates its own Ed25519 keypair and this value is replaced with its
    # real public key. Mirrors private-dev/playbooks/secrets.yml.
    - name: Generate and create auth-runtime-credentials secret
      ansible.builtin.shell: |
        set -euo pipefail
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT

        openssl genrsa -out "$tmpdir/jwt-private-key-pem" 2048 2>/dev/null
        openssl genpkey -algorithm ed25519 -out "$tmpdir/auth-proof-private-key" 2>/dev/null
        openssl genpkey -algorithm ed25519 -out "$tmpdir/_user-proof-placeholder-key.pem" 2>/dev/null
        openssl pkey -in "$tmpdir/_user-proof-placeholder-key.pem" -pubout -out "$tmpdir/user-proof-public-key" 2>/dev/null

        printf '%s' "auth-service" > "$tmpdir/jwt-issuer"
        printf '%s' "$(openssl rand -hex 8)" > "$tmpdir/jwt-key-id"
        printf '%s' "$(openssl rand -hex 8)" > "$tmpdir/auth-proof-key-id"
        printf '%s' "$(openssl rand -hex 8)" > "$tmpdir/user-proof-key-id"
        printf '%s' "$(openssl rand -hex 32)" > "$tmpdir/credential-hmac-key"
        printf '%s' "$(openssl rand -hex 16)" > "$tmpdir/replay-encryption-key"
        printf '%s' "${AUTH_ALLOWED_ORIGINS}" > "$tmpdir/allowed-origins"

        kubectl -n dropmong-auth create secret generic auth-runtime-credentials \
          --from-file=jwt-private-key-pem="$tmpdir/jwt-private-key-pem" \
          --from-file=jwt-key-id="$tmpdir/jwt-key-id" \
          --from-file=jwt-issuer="$tmpdir/jwt-issuer" \
          --from-file=credential-hmac-key="$tmpdir/credential-hmac-key" \
          --from-file=replay-encryption-key="$tmpdir/replay-encryption-key" \
          --from-file=auth-proof-private-key="$tmpdir/auth-proof-private-key" \
          --from-file=auth-proof-key-id="$tmpdir/auth-proof-key-id" \
          --from-file=user-proof-public-key="$tmpdir/user-proof-public-key" \
          --from-file=user-proof-key-id="$tmpdir/user-proof-key-id" \
          --from-file=allowed-origins="$tmpdir/allowed-origins" \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      when: auth_runtime_credentials_check.stdout != 'auth-runtime-credentials'
      environment:
        AUTH_ALLOWED_ORIGINS: "{{ aws_dev_auth_allowed_origins }}"
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"
      no_log: true

    - name: Verify aws-dev secrets exist
      ansible.builtin.shell: |
        kubectl -n dropmong-auth get secret auth-runtime-credentials -o jsonpath='{.metadata.name}'
      register: aws_dev_secret_check
      changed_when: false
      failed_when: false
      check_mode: false
      environment:
        KUBECONFIG: "{{ kubernetes_admin_conf_path }}"

    - name: Show aws-dev secret verification result
      ansible.builtin.debug:
        msg: "Secret is present: dropmong-auth/auth-runtime-credentials"
      when: aws_dev_secret_check.stdout == 'auth-runtime-credentials'

    - name: Show missing aws-dev secret verification result
      ansible.builtin.debug:
        msg: "Secret is missing: dropmong-auth/auth-runtime-credentials"
      when: aws_dev_secret_check.stdout != 'auth-runtime-credentials'
