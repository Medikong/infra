---
- name: Prepare local Observability storage on platform nodes
  hosts: platform_nodes
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Create Observability storage root
      ansible.builtin.file:
        path: /var/lib/cloudnative-observability
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create writable Observability storage directories
      ansible.builtin.file:
        path: "/var/lib/cloudnative-observability/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0777"
        recurse: true
      loop:
        - grafana
        - prometheus
        - loki
        - tempo
