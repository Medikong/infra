---
- name: Create private-dev application secrets
  hosts: control_plane
  become: false
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  vars:
    private_dev_required_env:
      POSTGRES_AUTH_PASSWORD: Postgres password for dropmong-auth/auth-db
      POSTGRES_PAYMENT_PASSWORD: Postgres password for dropmong-payment/payment-db
      POSTGRES_COUPON_PASSWORD: Postgres password for dropmong-coupon/coupon-db
      POSTGRES_ORDER_PASSWORD: Postgres password for dropmong-order/order-db
      POSTGRES_INTEREST_PASSWORD: Postgres password for dropmong-interest/interest-db
      POSTGRES_CATALOG_PASSWORD: Postgres password for dropmong-catalog/catalog-db
      POSTGRES_USER_PASSWORD: Postgres password for dropmong-user/user-db
      PGADMIN_PRIVATE_DEV_EMAIL: pgAdmin login email
      PGADMIN_PRIVATE_DEV_PASSWORD: pgAdmin login password
      GRAFANA_ADMIN_USER: Grafana admin user
      GRAFANA_ADMIN_PASSWORD: Grafana admin password
      SYNTHETIC_CUSTOMER_EMAIL: Synthetic customer email
      SYNTHETIC_CUSTOMER_PASSWORD: Synthetic customer password
      SYNTHETIC_PROVIDER_EMAIL: Synthetic provider email
      SYNTHETIC_PROVIDER_PASSWORD: Synthetic provider password
      SYNTHETIC_ADMIN_EMAIL: Synthetic admin email
      SYNTHETIC_ADMIN_PASSWORD: Synthetic admin password
    # url_scheme controls the generated database-url format, since each
    # service's DB driver expects a different DSN shape:
    #   psycopg  -> postgresql+psycopg://...   (Python service self-converts to asyncpg)
    #   asyncpg  -> postgresql+asyncpg://...   (Python service reads the URL as-is)
    #   plain    -> postgres://...?sslmode=disable   (Go service)
    postgres_secrets:
      - namespace: dropmong-auth
        name: postgres-auth-credentials
        password_env: POSTGRES_AUTH_PASSWORD
        host: auth-db
        database: auth_db
        url_scheme: plain
      - namespace: dropmong-payment
        name: postgres-payment-credentials
        password_env: POSTGRES_PAYMENT_PASSWORD
        host: payment-db
        database: payment_db
        url_scheme: psycopg
      - namespace: dropmong-coupon
        name: postgres-coupon-credentials
        password_env: POSTGRES_COUPON_PASSWORD
        host: coupon-db
        database: coupon_db
        url_scheme: plain
      - namespace: dropmong-order
        name: postgres-order-credentials
        password_env: POSTGRES_ORDER_PASSWORD
        host: order-db
        database: order_db
        url_scheme: psycopg
      - namespace: dropmong-interest
        name: postgres-interest-credentials
        password_env: POSTGRES_INTEREST_PASSWORD
        host: interest-db
        database: interest_db
        url_scheme: psycopg
      - namespace: dropmong-catalog
        name: postgres-catalog-credentials
        password_env: POSTGRES_CATALOG_PASSWORD
        host: catalog-db
        database: catalog_db
        url_scheme: asyncpg
      - namespace: dropmong-user
        name: postgres-user-credentials
        password_env: POSTGRES_USER_PASSWORD
        host: user-db
        database: user_db
        url_scheme: plain

  tasks:
    - name: Assert required environment variables are provided
      ansible.builtin.assert:
        that:
          - lookup('env', item.key) | length > 0
        fail_msg: "{{ item.key }} is required: {{ item.value }}"
      loop: "{{ private_dev_required_env | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true
      when: not ansible_check_mode

    - name: Ensure private-dev namespaces exist for secret bootstrap
      ansible.builtin.shell: |
        kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
      loop:
        - dropmong-auth
        - dropmong-payment
        - dropmong-coupon
        - dropmong-order
        - dropmong-interest
        - dropmong-catalog
        - dropmong-user
        - synthetic
        - monitoring
      loop_control:
        label: "{{ item }}"
      changed_when: false

    - name: Create PostgreSQL credential secrets
      ansible.builtin.shell: |
        database_url="$(
          python3 - <<'PY'
        import os
        from urllib.parse import quote

        password = quote(os.environ["DB_PASSWORD"], safe="")
        host = os.environ["DB_HOST"]
        database = os.environ["DB_NAME"]
        scheme = os.environ["DB_URL_SCHEME"]
        prefix = {
            "psycopg": "postgresql+psycopg",
            "asyncpg": "postgresql+asyncpg",
            "plain": "postgres",
        }[scheme]
        suffix = "?sslmode=disable" if scheme == "plain" else ""
        print(f"{prefix}://user:{password}@{host}:5432/{database}{suffix}")
        PY
        )"
        kubectl -n {{ item.namespace }} create secret generic {{ item.name }} \
          --from-literal=password="$DB_PASSWORD" \
          --from-literal=database-url="$database_url" \
          --dry-run=client -o yaml | kubectl apply -f -
      loop: "{{ postgres_secrets }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"
      environment:
        DB_PASSWORD: "{{ lookup('env', item.password_env) }}"
        DB_HOST: "{{ item.host }}"
        DB_NAME: "{{ item.database }}"
        DB_URL_SCHEME: "{{ item.url_scheme }}"
      no_log: true

    - name: Create pgAdmin credential secret
      ansible.builtin.shell: |
        kubectl -n dropmong-payment create secret generic pgadmin-private-dev-credentials \
          --from-literal=email='{{ lookup('env', 'PGADMIN_PRIVATE_DEV_EMAIL') }}' \
          --from-literal=password='{{ lookup('env', 'PGADMIN_PRIVATE_DEV_PASSWORD') }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      no_log: true

    - name: Create Grafana admin credential secret
      ansible.builtin.shell: |
        kubectl -n monitoring create secret generic grafana-admin-credentials \
          --from-literal=admin-user='{{ lookup('env', 'GRAFANA_ADMIN_USER') }}' \
          --from-literal=admin-password='{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      no_log: true

    - name: Create synthetic traffic credential secret
      ansible.builtin.shell: |
        kubectl -n synthetic create secret generic synthetic-traffic-credentials \
          --from-literal=SYNTHETIC_CUSTOMER_EMAIL='{{ lookup('env', 'SYNTHETIC_CUSTOMER_EMAIL') }}' \
          --from-literal=SYNTHETIC_CUSTOMER_PASSWORD='{{ lookup('env', 'SYNTHETIC_CUSTOMER_PASSWORD') }}' \
          --from-literal=SYNTHETIC_PROVIDER_EMAIL='{{ lookup('env', 'SYNTHETIC_PROVIDER_EMAIL') }}' \
          --from-literal=SYNTHETIC_PROVIDER_PASSWORD='{{ lookup('env', 'SYNTHETIC_PROVIDER_PASSWORD') }}' \
          --from-literal=SYNTHETIC_ADMIN_EMAIL='{{ lookup('env', 'SYNTHETIC_ADMIN_EMAIL') }}' \
          --from-literal=SYNTHETIC_ADMIN_PASSWORD='{{ lookup('env', 'SYNTHETIC_ADMIN_PASSWORD') }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      no_log: true

    - name: Verify private-dev secrets exist
      ansible.builtin.shell: |
        kubectl -n {{ item.namespace }} get secret {{ item.name }} -o jsonpath='{.metadata.name}'
      loop:
        - namespace: dropmong-auth
          name: postgres-auth-credentials
        - namespace: dropmong-payment
          name: postgres-payment-credentials
        - namespace: dropmong-coupon
          name: postgres-coupon-credentials
        - namespace: dropmong-order
          name: postgres-order-credentials
        - namespace: dropmong-interest
          name: postgres-interest-credentials
        - namespace: dropmong-catalog
          name: postgres-catalog-credentials
        - namespace: dropmong-user
          name: postgres-user-credentials
        - namespace: dropmong-payment
          name: pgadmin-private-dev-credentials
        - namespace: monitoring
          name: grafana-admin-credentials
        - namespace: synthetic
          name: synthetic-traffic-credentials
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"
      register: private_dev_secret_check
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Show private-dev secret verification results
      ansible.builtin.debug:
        msg: "Secret is present: {{ item.item.namespace }}/{{ item.item.name }}"
      loop: "{{ private_dev_secret_check.results }}"
      loop_control:
        label: "{{ item.item.namespace }}/{{ item.item.name }}"
      when: item.stdout == item.item.name

    - name: Show missing private-dev secret verification results
      ansible.builtin.debug:
        msg: "Secret is missing: {{ item.item.namespace }}/{{ item.item.name }}"
      loop: "{{ private_dev_secret_check.results }}"
      loop_control:
        label: "{{ item.item.namespace }}/{{ item.item.name }}"
      when: item.stdout != item.item.name
