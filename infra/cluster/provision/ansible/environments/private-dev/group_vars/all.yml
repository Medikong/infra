kubernetes_release: "{{ lookup('env', 'KUBERNETES_RELEASE') | default('v1.34', true) }}"
use_upstream_calico_images: "{{ not local_registry_enabled }}"
kubernetes_admin_conf_path: /etc/kubernetes/admin.conf
kubernetes_admin_user: lab-bum4496-833cff
kubernetes_admin_group: lab-bum4496-833cff
kubernetes_admin_home: /home/lab-bum4496-833cff
kubernetes_cri_socket: unix:///run/containerd/containerd.sock
kubernetes_pod_network_cidr: "{{ lookup('env', 'KUBERNETES_POD_NETWORK_CIDR') | default('192.168.0.0/16', true) }}"
kubernetes_node_ready_timeout: "{{ lookup('env', 'KUBERNETES_NODE_READY_TIMEOUT') | default('300s', true) }}"
kubeadm_image_pull_timeout: "{{ lookup('env', 'KUBEADM_IMAGE_PULL_TIMEOUT') | default('600s', true) }}"
kubeadm_init_timeout: "{{ lookup('env', 'KUBEADM_INIT_TIMEOUT') | default('600s', true) }}"
calico_node_ready_timeout: "{{ lookup('env', 'CALICO_NODE_READY_TIMEOUT') | default('600s', true) }}"
containerd_config_path: /etc/containerd/config.toml
containerd_registry_config_path: /etc/containerd/certs.d
crictl_config_path: /etc/crictl.yaml
bootstrap_marker_path: /etc/cloudnative-cluster-ready
calico_version: "{{ lookup('env', 'CALICO_VERSION') | default('v3.31.4', true) }}"
calico_manifest_url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml"
calico_local_manifest_path: "/tmp/calico-{{ calico_version }}-local-registry.yaml"
calico_image_pull_timeout: "{{ lookup('env', 'CALICO_IMAGE_PULL_TIMEOUT') | default('300s', true) }}"
calico_images:
  - "quay.io/calico/cni:{{ calico_version }}"
  - "quay.io/calico/node:{{ calico_version }}"
  - "quay.io/calico/kube-controllers:{{ calico_version }}"
calico_local_images: "{{ calico_images | map('regex_replace', '^', local_registry_endpoint ~ '/') | list }}"
local_registry_host: "{{ lookup('env', 'LOCAL_REGISTRY_HOST') | default('10.10.10.10', true) }}"
local_registry_port: "{{ lookup('env', 'LOCAL_REGISTRY_PORT') | default('5000', true) }}"
local_registry_endpoint: "{{ local_registry_host }}:{{ local_registry_port }}"
local_registry_enabled: "{{ lookup('env', 'LOCAL_REGISTRY_ENABLED') | default('false', true) | bool }}"
local_registry_storage_path: "{{ lookup('env', 'LOCAL_REGISTRY_STORAGE_PATH') | default('/var/lib/docker-registry', true) }}"
local_registry_tls_dir: "{{ lookup('env', 'LOCAL_REGISTRY_TLS_DIR') | default('/etc/docker/registry/tls', true) }}"
local_registry_host_tls_dir: "{{ lookup('env', 'LOCAL_REGISTRY_HOST_TLS_DIR') | default(lookup('env', 'HOME') ~ '/.cache/cloudnative-study/infra-cluster/local-registry', true) }}"
local_registry_host_ca_cert_path: "{{ local_registry_host_tls_dir }}/ca.crt"
local_registry_host_ca_key_path: "{{ local_registry_host_tls_dir }}/ca.key"
local_registry_ca_cert_path: "{{ local_registry_tls_dir }}/ca.crt"
local_registry_ca_key_path: "{{ local_registry_tls_dir }}/ca.key"
local_registry_server_cert_path: "{{ local_registry_tls_dir }}/server.crt"
local_registry_server_key_path: "{{ local_registry_tls_dir }}/server.key"
local_registry_csr_path: "{{ local_registry_tls_dir }}/server.csr"
local_registry_openssl_config_path: "{{ local_registry_tls_dir }}/server-openssl.cnf"
registry_pull_test_image: "{{ lookup('env', 'REGISTRY_PULL_TEST_IMAGE') | default('', true) }}"
metrics_server_version: "{{ lookup('env', 'METRICS_SERVER_VERSION') | default('v0.8.1', true) }}"
metrics_server_manifest_url: "{{ lookup('env', 'METRICS_SERVER_MANIFEST_URL') | default('https://github.com/kubernetes-sigs/metrics-server/releases/download/' ~ metrics_server_version ~ '/components.yaml', true) }}"
metrics_server_wait_timeout: "{{ lookup('env', 'METRICS_SERVER_WAIT_TIMEOUT') | default('300s', true) }}"
metrics_server_node_selector_hostname: "{{ lookup('env', 'METRICS_SERVER_NODE_SELECTOR_HOSTNAME') | default(groups['control_plane'][0], true) }}"
helm_version: "{{ lookup('env', 'HELM_VERSION') | default('v3.15.4', true) }}"
helm_install_script_url: "{{ lookup('env', 'HELM_INSTALL_SCRIPT_URL') | default('https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3', true) }}"
helm_install_script_path: /tmp/get-helm-3

server_base_packages:
  - apt-transport-https
  - bash-completion
  - ca-certificates
  - containerd
  - curl
  - git
  - gnupg
  - gpg
  - jq
  - rsync
  - tar
  - tmux
  - unzip
  - vim
  - wget

server_debug_packages:
  - btop
  - dnsutils
  - htop
  - iproute2
  - iputils-ping
  - lsof
  - ncdu
  - net-tools
  - netcat-openbsd
  - tcpdump
  - traceroute
  - tree

private_dev_argocd_namespace: "{{ lookup('env', 'PRIVATE_DEV_ARGOCD_NAMESPACE') | default('argocd', true) }}"
private_dev_argocd_install_manifest_url: "{{ lookup('env', 'PRIVATE_DEV_ARGOCD_INSTALL_MANIFEST_URL') | default('https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml', true) }}"
private_dev_argocd_root_application_url: "{{ lookup('env', 'PRIVATE_DEV_ARGOCD_ROOT_APPLICATION_URL') | default('https://raw.githubusercontent.com/TicketMong/gitops/main/argo/applications/private-dev/root.yaml', true) }}"
private_dev_argocd_server_ready_timeout: "{{ lookup('env', 'PRIVATE_DEV_ARGOCD_SERVER_READY_TIMEOUT') | default('300s', true) }}"
private_dev_argocd_controller_ready_timeout: "{{ lookup('env', 'PRIVATE_DEV_ARGOCD_CONTROLLER_READY_TIMEOUT') | default('300s', true) }}"
private_dev_argocd_root_application_name: "{{ lookup('env', 'PRIVATE_DEV_ARGOCD_ROOT_APPLICATION_NAME') | default('medikong-private-dev-apps', true) }}"
